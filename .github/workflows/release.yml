name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to release from (used as informational label only; csproj <Version> drives the package version)'
        required: false
        default: 'v1.0.0'

jobs:
  publish:
    name: Pack and publish to NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Verify tag matches csproj version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' SmarterSystems.ElliottWaves.Analyzer/SmarterSystems.ElliottWaves.Analyzer.csproj)
          echo "Tag version:    $TAG"
          echo "csproj version: $CSPROJ_VERSION"
          if [ "$TAG" != "$CSPROJ_VERSION" ]; then
            echo "::error::Tag v$TAG does not match csproj <Version>$CSPROJ_VERSION</Version>. Bump the csproj before tagging."
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore SmarterSystems.ElliottWaves.sln

      - name: Build (Release)
        run: dotnet build SmarterSystems.ElliottWaves.Analyzer/SmarterSystems.ElliottWaves.Analyzer.csproj --no-restore --configuration Release -warnaserror

      - name: Pack
        run: dotnet pack SmarterSystems.ElliottWaves.Analyzer/SmarterSystems.ElliottWaves.Analyzer.csproj --no-build --configuration Release --output ./artifacts

      - name: Publish to NuGet
        run: dotnet nuget push './artifacts/*.nupkg' --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbol package
        run: dotnet nuget push './artifacts/*.snupkg' --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.ref }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
